<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1c1c1e" />
    <title>Smooth Scroll</title>
    <script type="module" src="/src/main.ts"></script>
  </head>

  <body>
    <div class="titlebar" data-tauri-drag-region></div>

    <main>
      <!-- Permission Banner -->
      <div class="banner" id="permission-banner" style="display: none">
        <p>Accessibility permission required for scroll interception.</p>
        <button id="open-accessibility-btn">Open Settings</button>
      </div>

      <!-- Master Toggle -->
      <section class="section">
        <div class="row">
          <div class="row-left">
            <span class="indicator" id="status-dot"></span>
            <div>
              <p class="row-title">Smooth Scrolling</p>
              <p class="row-sub" id="status-text">Running</p>
            </div>
          </div>
          <label class="switch">
            <input type="checkbox" id="enabled-toggle" checked aria-label="Enable smooth scrolling" />
            <span class="switch-track"></span>
          </label>
        </div>
      </section>

      <!-- Scroll -->
      <section class="section">
        <h2>Scroll</h2>
        <div class="control">
          <div class="control-label">
            <span>Speed</span>
            <span class="mono" id="speed-value">3.0x</span>
          </div>
          <div class="track-wrap">
            <input type="range" id="scroll-speed" min="0.5" max="10" step="0.5" value="3.0" />
            <div class="track-fill" id="speed-fill"></div>
          </div>
        </div>
        <div class="control">
          <div class="control-label">
            <span>Acceleration</span>
            <span class="mono" id="accel-value">0.5</span>
          </div>
          <div class="track-wrap">
            <input type="range" id="acceleration" min="0" max="1" step="0.1" value="0.5" />
            <div class="track-fill" id="accel-fill"></div>
          </div>
        </div>
        <div class="control">
          <div class="control-label">
            <span>Smoothness</span>
            <span class="mono" id="duration-value">300ms</span>
          </div>
          <div class="track-wrap">
            <input type="range" id="duration" min="50" max="800" step="25" value="300" />
            <div class="track-fill" id="duration-fill"></div>
          </div>
        </div>
      </section>

      <!-- Momentum -->
      <section class="section">
        <div class="row" style="margin-bottom: 12px">
          <h2 style="margin: 0">Momentum</h2>
          <label class="switch switch-sm">
            <input type="checkbox" id="inertia-toggle" checked aria-label="Enable momentum scrolling" />
            <span class="switch-track"></span>
          </label>
        </div>
        <div id="decay-setting">
          <div class="control">
            <div class="control-label">
              <span>Glide distance</span>
              <span class="mono" id="decay-value">0.92</span>
            </div>
            <div class="track-wrap">
              <input type="range" id="inertia-decay" min="0.8" max="0.99" step="0.01" value="0.92" />
              <div class="track-fill" id="decay-fill"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- Easing -->
      <section class="section">
        <h2>Easing</h2>
        <div class="chips">
          <label class="chip">
            <input type="radio" name="easing" value="EaseOut" checked />
            <span>Ease Out</span>
          </label>
          <label class="chip">
            <input type="radio" name="easing" value="EaseInOut" />
            <span>Ease In-Out</span>
          </label>
          <label class="chip">
            <input type="radio" name="easing" value="Linear" />
            <span>Linear</span>
          </label>
        </div>
      </section>

      <footer>v0.1.0</footer>
    </main>
  </body>
</html>
